  <style type="text/css">



    /* ==========================================================================



       24H.COM.VN STYLE DESIGN SYSTEM - 2-COLUMN GRID WITH STICKY SIDEBAR



       ========================================================================== */



    :root {



      --primary: #599b31;          /* 24h brand green */



      --primary-hover: #488224;



      --bg-body: #f4f6f8;



      --bg-card: #ffffff;



      --text-main: #222222;



      --text-muted: #6e7375;



      --border-color: #eef0f2;



      --shadow: 0 1px 3px rgba(0, 0, 0, 0.05);



      --radius: 6px;



    }



    [data-theme="dark"] {



      --bg-body: #0b0f19;



      --bg-card: #151d30;



      --text-main: #f1f5f9;



      --text-muted: #94a3b8;



      --border-color: #1e293b;



      --shadow: 0 4px 20px rgba(0, 0, 0, 0.15);



    }



    * {



      box-sizing: border-box;



      margin: 0;



      padding: 0;



    }



    body {



      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;



      background-color: var(--bg-body);



      color: var(--text-main);



      line-height: 1.5;



      padding-bottom: 40px;



      transition: background-color 0.3s ease, color 0.3s ease;



    }



    a {



      text-decoration: none;



      color: inherit;



    }



    /* Header & Navigation Bar (24h Green theme) */



    header.header {



      background-color: var(--primary);



      position: sticky;



      top: 0;



      z-index: 100;



      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);



    }



    .header-container {



      max-width: 1168px;



      margin: 0 auto;



      height: 50px;



      display: flex;



      justify-content: space-between;



      align-items: center;



      padding: 0 16px;



    }



    .header-left-nav {



      display: flex;



      align-items: center;



      gap: 16px;



      height: 100%;



    }



    .menu-toggle-btn {



      color: #ffffff;



      font-size: 1.25rem;



      background: none;



      border: none;



      cursor: pointer;



      display: flex;



      align-items: center;



    }



    .home-link {



      color: #ffffff;



      font-size: 1.2rem;



      display: flex;



      align-items: center;



      height: 100%;



      padding: 0 8px;



    }



    .main-nav {



      display: flex;



      align-items: center;



      list-style: none;



      white-space: nowrap;



      height: 100%;



    }



    .main-nav li {



      height: 100%;



      display: flex;



      align-items: center;



    }



    .main-nav li a {



      color: #ffffff;



      font-weight: 700;



      font-size: 0.82rem;



      text-transform: uppercase;



      padding: 0 12px;



      height: 100%;



      display: flex;



      align-items: center;



      opacity: 0.9;



      transition: background-color 0.2s ease;



    }



    .main-nav li a:hover, .main-nav li.active a {



      background-color: var(--primary-hover);



      opacity: 1;



    }



    .header-right {



      display: flex;



      align-items: center;



      gap: 12px;



    }



    .search-box {



      background-color: rgba(255, 255, 255, 0.15);



      border: 1px solid rgba(255, 255, 255, 0.2);



      border-radius: 9999px;



      padding: 6px 14px;



      display: flex;



      align-items: center;



      gap: 8px;



      width: 220px;



      transition: all 0.2s ease;



    }



    .search-box:focus-within {



      background-color: #ffffff;



      border-color: #ffffff;



    }



    .search-box i {



      color: #ffffff;



      font-size: 0.85rem;



    }



    .search-box:focus-within i {



      color: var(--text-muted);



    }



    .search-box input {



      border: none;



      background: transparent;



      outline: none;



      width: 100%;



      font-size: 0.8rem;



      color: #ffffff;



    }



    .search-box:focus-within input {



      color: #222222;



    }



    .search-box input::placeholder {



      color: rgba(255, 255, 255, 0.7);



    }



    .theme-toggle {



      background: none;



      border: 1px solid rgba(255, 255, 255, 0.3);



      border-radius: 50%;



      width: 30px;



      height: 30px;



      display: flex;



      align-items: center;



      justify-content: center;



      cursor: pointer;



      color: #ffffff;



      transition: all 0.2s ease;



    }



    .theme-toggle:hover {



      background-color: rgba(255, 255, 255, 0.1);



    }



    /* Trending Section */



    .trending-section {



      background-color: var(--bg-card);



      border-bottom: 1px solid var(--border-color);



      padding: 8px 0;



      margin-bottom: 20px;



    }



    .trending-container {



      max-width: 1168px;



      margin: 0 auto;



      padding: 0 16px;



      display: flex;



      align-items: center;



      gap: 12px;



    }



    .trending-label {



      font-weight: 800;



      color: #ef4444;



      font-size: 0.85rem;



      display: flex;



      align-items: center;



      gap: 4px;



      white-space: nowrap;



    }



    .trending-items {



      display: flex;



      align-items: center;



      gap: 20px;



      overflow-x: auto;



      scrollbar-width: none;



      width: 100%;



    }



    .trending-items::-webkit-scrollbar {



      display: none;



    }



    .trending-items a {



      font-size: 0.82rem;



      font-weight: 600;



      color: var(--text-main);



      white-space: nowrap;



      transition: color 0.2s ease;



    }



    .trending-items a:hover {



      color: var(--primary);



    }



    /* Main Container (2-Column Grid Layout) */



    .main-layout {



      max-width: 1168px;



      margin: 0 auto;



      padding: 0 16px;



    }



    .main-layout-grid {



      display: grid;



      grid-template-columns: 840px 288px;



      gap: 20px;



    }



    /* Column 1: Primary Content (Left) */



    .primary-content {



      display: flex;



      flex-direction: column;



      gap: 20px;



    }



    /* Homepage Top Block: Featured Grid (Featured on Left, Text list on Right) */



    .homepage-top-grid {



      display: grid;



      grid-template-columns: 540px 280px;



      gap: 20px;



    }



    .top-large-card {



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      overflow: hidden;



      cursor: pointer;



      box-shadow: var(--shadow);



      display: flex;



      flex-direction: column;



      transition: all 0.2s ease;



    }



    .top-large-card:hover {



      box-shadow: 0 4px 16px rgba(0,0,0,0.06);



    }



    .top-large-image {



      width: 100%;



      aspect-ratio: 16/10;



      overflow: hidden;



      position: relative;



    }



    .top-large-image.no-image {



      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);



      display: flex;



      align-items: center;



      justify-content: center;



    }



    .top-large-image.no-image::before {



      content: '\f1ea';



      font-family: 'Font Awesome 6 Free';



      font-weight: 900;



      font-size: 3rem;



      color: #94a3b8;



    }



    .top-large-image img {



      width: 100%;



      height: 100%;



      object-fit: cover;



      transition: transform 0.5s ease;



    }



    .top-large-card:hover .top-large-image img {



      transform: scale(1.02);



    }



    .top-large-content {



      padding: 16px;



    }



    .top-large-content h2 {



      font-size: 1.2rem;



      font-weight: 800;



      line-height: 1.35;



      margin-bottom: 8px;



      color: var(--text-main);



      transition: color 0.15s ease;



    }



    .top-large-card:hover h2 {



      color: var(--primary);



    }



    .top-large-content p {



      font-size: 0.82rem;



      color: var(--text-muted);



      line-height: 1.45;



    }



    /* Column 2 (Middle) inside Homepage Top Block */



    .middle-content {



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      padding: 16px;



      box-shadow: var(--shadow);



      display: flex;



      flex-direction: column;



      gap: 12px;



    }



    .column-title {



      font-size: 0.85rem;



      font-weight: 800;



      color: var(--primary);



      text-transform: uppercase;



      border-bottom: 2px solid var(--primary);



      padding-bottom: 6px;



      margin-bottom: 4px;



      display: flex;



      align-items: center;



      gap: 6px;



    }



    .text-news-item {



      display: flex;



      gap: 10px;



      padding-bottom: 10px;



      border-bottom: 1px solid var(--border-color);



      cursor: pointer;



      align-items: center; /* vertical alignment */



    }



    .text-news-item:last-child {



      border-bottom: none;



      padding-bottom: 0;



    }



    .text-news-thumb {



      width: 45px;



      height: 45px;



      border-radius: 4px;



      overflow: hidden;



      flex-shrink: 0;



      position: relative;



    }



    .text-news-thumb img {



      width: 100%;



      height: 100%;



      object-fit: cover;



    }



    .text-news-thumb.no-image {



      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);



      display: flex;



      align-items: center;



      justify-content: center;



    }



    .text-news-thumb.no-image::before {



      content: '1ea';



      font-family: 'Font Awesome 6 Free';



      font-weight: 900;



      font-size: 0.8rem;



      color: #94a3b8;



    }



    .text-news-right {



      display: flex;



      flex-direction: column;



      justify-content: center;



      flex-grow: 1;



    }



    .text-news-cat-label {



      font-size: 0.65rem;



      font-weight: 700;



      color: var(--primary);



      margin-bottom: 1px;



      display: inline-block;



    }



    .text-news-title {



      font-size: 0.8rem;



      font-weight: 700;



      color: var(--text-main);



      line-height: 1.3;



      display: -webkit-box;



      -webkit-line-clamp: 2;



      -webkit-box-orient: vertical;



      overflow: hidden;



      transition: color 0.15s ease;



    }



    .text-news-item:hover .text-news-title {



      color: var(--primary);



    }



        /* Top 3 Horizontal Cards Row */

    .top-three-row {

      display: grid;

      grid-template-columns: repeat(3, 1fr);

      gap: 20px;

      margin-top: 20px;

    }



    @media screen and (max-width: 991px) {

      .main-layout-grid {

        grid-template-columns: 1fr;

      }

      .search-box {

        width: 180px;

      }

      .category-block-grid {

        grid-template-columns: 1fr;

      }

      /* Wrap homepage top grid to 1fr on tablets and phones! */

      .homepage-top-grid {

        grid-template-columns: 1fr;

      }

    }



    @media screen and (max-width: 768px) {

      .header-container {

        height: auto;

        flex-direction: column;

        padding: 10px;

        gap: 10px;

      }

      .main-nav {

        flex-wrap: wrap;

        justify-content: center;

        gap: 10px;

      }

      .search-box {

        display: none;

      }

      .homepage-top-grid {

        grid-template-columns: 1fr;

      }

      .top-large-card {

        flex-direction: column;

      }

      .top-three-row {

        grid-template-columns: 1fr;

      }



      /* Mobile Horizontal Cards Layout */

      .card {

        display: flex !important;

        flex-direction: row !important;

        align-items: flex-start !important;

        padding: 10px !important;

        gap: 12px !important;

        height: auto !important;

        border-radius: 8px !important;

      }

      .card-thumb {

        flex-shrink: 0 !important;

        width: 100px !important;

        height: 75px !important;

        aspect-ratio: auto !important;

        margin: 0 !important;

        border-radius: 6px !important;

        overflow: hidden !important;

      }

      .card-thumb img {

        width: 100% !important;

        height: 100% !important;

        object-fit: cover !important;

      }

      .card-content {

        flex: 1 !important;

        padding: 0 !important;

        display: flex !important;

        flex-direction: column !important;

        gap: 4px !important;

      }

      .card-title {

        font-size: 14px !important;

        line-height: 1.35 !important;

        margin: 0 !important;

        display: -webkit-box !important;

        -webkit-line-clamp: 2 !important;

        -webkit-box-orient: vertical !important;

        overflow: hidden !important;

      }

      .card-desc {

        display: none !important;

      }

      .card-meta {

        font-size: 10px !important;

        margin-bottom: 2px !important;

        flex-wrap: wrap !important;

        gap: 6px !important;

      }

      

      .small-vertical-card {

        display: flex !important;

        flex-direction: row !important;

        align-items: flex-start !important;

        padding: 10px !important;

        gap: 12px !important;

        height: auto !important;

        border-radius: 8px !important;

      }

      .small-vertical-card .card-thumb {

        flex-shrink: 0 !important;

        width: 100px !important;

        height: 75px !important;

        aspect-ratio: auto !important;

        margin: 0 !important;

        border-radius: 6px !important;

        overflow: hidden !important;

      }

      .small-vertical-card .card-thumb img {

        width: 100% !important;

        height: 100% !important;

        object-fit: cover !important;

      }

      .small-vertical-card .card-content {

        flex: 1 !important;

        padding: 0 !important;

      }

      .small-vertical-card .card-title {

        font-size: 14px !important;

        line-height: 1.35 !important;

        margin: 0 !important;

        display: -webkit-box !important;

        -webkit-line-clamp: 2 !important;

        -webkit-box-orient: vertical !important;

        overflow: hidden !important;

      }

    }

    

    /* Publisher name truncation with ellipsis */

    .pub-name {

      max-width: 130px;

      overflow: hidden;

      text-overflow: ellipsis;

      white-space: nowrap;

      display: inline-block;

      vertical-align: bottom;

    }

    

    @media screen and (max-width: 768px) {

      .pub-name {

        max-width: 90px !important;

      }

    }

  </style>



</head>

            </div>



            <div class="loading-spinner-wrapper" id="loading-spinner" style="grid-column: 1 / span 2;">



              <i class="fas fa-spinner fa-spin"></i> Đang tải thêm tin tức...



            </div>



          </div>



        `;



        // Right sticky sidebar HTML structure



        let rightColHtml = `



          <aside class="sidebar-content">



            <!-- Sidebar widgets -->



            <div class="widget">



              <div class="widget-title"><i class="fas fa-cloud-sun"></i> Thời tiết</div>



              <div class="weather-info">



                <div class="weather-left">



                  <div class="weather-icon"><i class="fas fa-cloud-sun-rain"></i></div>



                  <div>



                    <div class="weather-city">Hà Nội</div>



                    <div class="weather-desc">Mưa rào nhẹ, nhiều mây</div>



                  </div>



                </div>



                <div class="weather-temp">28°C</div>



              </div>



            </div>



            <div class="sidebar-news-list">



              <div class="column-title" style="border-color:#ef4444; color:#ef4444;"><i class="fas fa-fire"></i> Tin đọc nhiều</div>



        `;



        col3Arts.forEach(a => {



          rightColHtml += renderSidebarHorizontalCard(a);



        });



        rightColHtml += `



            </div>



          </aside>



        `;



        // Load into layout grid



        layoutGrid.innerHTML = leftColHtml + rightColHtml;



        // Render initial batch of standard cards inside infinite stream



        const streamContainer = document.getElementById('infinite-stream');



        let initialStreamHtml = '';



        



        // Load articles 16 to 24 initial stream batch



        const initialBatch = filtered.slice(15, 23);



        initialBatch.forEach(a => {



          initialStreamHtml += renderArticleCard(a);



        });



        streamContainer.innerHTML = `<div class="articles-grid">${initialStreamHtml}</div>`;



        // Append first category blocks directly inside streamContainer!



        streamContainer.insertAdjacentHTML('beforeend', renderCategoryBlock(blockCategories[0]));



        streamContainer.insertAdjacentHTML('beforeend', renderCategoryBlock(blockCategories[1]));



      } else {



        // Render category page layout (classic list grid view)



        layoutGrid.style.gridTemplateColumns = '840px 288px';



        



        let listHtml = `



          <div class="primary-content">



            <div class="filter-header-info">



              <h2>Chuyên mục: ${category}</h2>



              <button onclick="filterCategory('all')">Quay lại trang chủ</button>



            </div>



            <div class="articles-grid">



        `;



        



        filtered.forEach(art => {



          listHtml += renderArticleCard(art);



        });



        if (filtered.length === 0) {



          listHtml += '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">Không có bài viết nào.</div>';



          hasMore = false;



        }



        listHtml += `



            </div>



          </div>



          <aside class="sidebar-content">



            <!-- Sidebar gold widget -->



            <div class="widget">



              <div class="widget-title"><i class="fas fa-coins"></i> Giá vàng SJC</div>



              <table class="gold-table">



                <thead>



                  <tr>



                    <th>Thương hiệu</th>



                    <th>Mua vào</th>



                    <th>Bán ra</th>



                  </tr>



                </thead>



                <tbody>



                  <tr>



                    <td>SJC HN</td>



                    <td class="gold-buy">80.20 M</td>



                    <td class="gold-sell">82.20 M</td>



                  </tr>



                  <tr>



                    <td>Doji HN</td>



                    <td class="gold-buy">80.00 M</td>



                    <td class="gold-sell">82.00 M</td>



                  </tr>



                </tbody>



              </table>



            </div>



          </aside>



        `;



        layoutGrid.innerHTML = listHtml;



        hasMore = false; // Disable scroll loading on inner category pages



      }



    }



    // Load More Articles (Infinite Scroll)



    function loadMoreArticles() {



      if (isLoading) return;



      isLoading = true;



      



      const spinner = document.getElementById('loading-spinner');



      if (spinner) spinner.style.display = 'flex';



      setTimeout(() => {



        currentPage++;



        



        const streamContainer = document.getElementById('infinite-stream');



        const leftPrimary = document.getElementById('left-primary-container');



        



        if (!streamContainer) {



          isLoading = false;



          return;



        }



        let filtered = [];



        if (currentCategory === 'all') {



          filtered = mockArticles;



        } else {



          filtered = mockArticles.filter(art => art.category === currentCategory);



        }



        // Load next batch of articles (modulo wrap-around for true infinite scrolling!)



        const offsetStart = 15 + (currentPage - 2) * articlesLimit;



        const offsetEnd = offsetStart + articlesLimit;



        



        let batchHtml = '';



        



        if (categoryBlocksIndex >= blockCategories.length) {



          // Inside the "Tin tức cũ hơn" section - render OLD cards WITHOUT date!



          for (let i = offsetStart; i < offsetEnd; i++) {



            const index = i % filtered.length;



            batchHtml += renderOldArticleCard(filtered[index]);



          }



        } else {



          // Inside normal stream - render standard cards with date



          for (let i = offsetStart; i < offsetEnd; i++) {



            const index = i % filtered.length;



            batchHtml += renderArticleCard(filtered[index]);



          }



        }



        



        // Wrap the batched cards inside a grid wrapper to display correctly below category dividers!



        const gridHtml = `<div class="articles-grid" style="margin-top: 15px;">${batchHtml}</div>`;



        streamContainer.insertAdjacentHTML('beforeend', gridHtml);



        // Manage category dividers: render them ONCE, then switch to "Tin tức cũ hơn" section



        if (categoryBlocksIndex < blockCategories.length) {



          const nextCategory = blockCategories[categoryBlocksIndex];



          if (leftPrimary && spinner) {



            streamContainer.insertAdjacentHTML('beforeend', renderCategoryBlock(nextCategory));



          }



          categoryBlocksIndex++;



        } else {



          // If we have just finished rendering the last category block ("Du lịch"), insert the "Các tin tức cũ hơn" section header



          if (!oldNewsHeaderInserted) {



            const headerHtml = `



              <div class="category-block-divider" style="grid-column: 1 / span 2; margin: 20px 0 10px 0;">



                <div class="category-block-header" style="border-color: #6e7375;">



                  <h3 style="color: #6e7375;"><i class="fas fa-history"></i> Tin tức cũ hơn</h3>



                </div>



              </div>



            `;



            if (leftPrimary && spinner) {



              leftPrimary.insertBefore(document.createRange().createContextualFragment(headerHtml), spinner);



            }



            oldNewsHeaderInserted = true;



          }



        }



        



        if (spinner) spinner.style.display = 'none';



        isLoading = false;



      }, 1000);



    }    // Search Box logic



    function handleSearch(event) {



      const query = document.getElementById('search-input').value.toLowerCase().trim();



      const layoutGrid = document.getElementById('main-layout-grid');



      if (!query) {



        filterCategory('all');



        return;



      }



      layoutGrid.style.gridTemplateColumns = '840px 288px';



      hasMore = false;



      const matches = mockArticles.filter(art => 



        art.title.toLowerCase().includes(query) || 



        art.desc.toLowerCase().includes(query) ||



        art.category.toLowerCase().includes(query)



      );



      let listHtml = `



        <div class="primary-content">



          <div class="filter-header-info">



            <h2>Kết quả tìm kiếm: "${query}"</h2>



            <button onclick="filterCategory('all')">Quay lại trang chủ</button>



          </div>



          <div class="articles-grid">



      `;



      matches.forEach(art => {



        listHtml += renderArticleCard(art);



      });



      if (matches.length === 0) {



        listHtml += '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">Không tìm thấy kết quả phù hợp.</div>';



      }



      listHtml += `



          </div>



        </div>



        <aside class="sidebar-content">



          <div class="widget">



            <div class="widget-title"><i class="fas fa-tags"></i> Tìm kiếm hot</div>



            <div class="hashtags">



              <a href="#" onclick="event.preventDefault(); fillSearch('World Cup')">#World Cup 2026</a>



              <a href="#" onclick="event.preventDefault(); fillSearch('Giá vàng')">#Giá vàng hôm nay</a>



            </div>



          </div>



        </aside>



      `;



      layoutGrid.innerHTML = listHtml;



    }



    // Fill hashtag click into search



    function fillSearch(val) {



      const searchBox = document.getElementById('search-input');



      searchBox.value = val;



      handleSearch();



    }



    // Toggle Theme



    function toggleTheme() {



      const html = document.documentElement;



      const themeBtn = document.getElementById('theme-btn');



      



      if (html.getAttribute('data-theme') === 'dark') {



        html.removeAttribute('data-theme');



        themeBtn.innerHTML = '<i class="fas fa-moon"></i>';



        localStorage.setItem('theme', 'light');



      } else {



        html.setAttribute('data-theme', 'dark');



        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';



        localStorage.setItem('theme', 'dark');



      }



    }



    // Load theme from localStorage



    function loadSavedTheme() {



      const saved = localStorage.getItem('theme');



      const html = document.documentElement;



      const themeBtn = document.getElementById('theme-btn');



      if (saved === 'dark') {



        html.setAttribute('data-theme', 'dark');



        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';



      }



    }



    // Toast show helper



    function showToast(msg) {



      const toast = document.getElementById('toast-message');



      toast.innerText = msg;



      toast.classList.add('show');



      setTimeout(() => {



        toast.classList.remove('show');



      }, 2000);



    }



    // Infinite Scroll trigger on scroll to bottom



    window.addEventListener('scroll', () => {



      if (currentCategory !== 'all') return;



      



      if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 120) {



        loadMoreArticles();



      }



    });



    // Initialize page



    window.addEventListener('DOMContentLoaded', () => {



      loadSavedTheme();



      initDynamicWidgets();



      filterCategory('all');



    });



  </script>



</body>



</html>
