name: Auto Update News from Bao Moi

on:
  schedule:
    - cron: '*/5 * * * *' # Tự động chạy cào tin mới mỗi 5 phút
  workflow_dispatch: # Nút chạy thủ công khi cần gấp

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Run news scraper script
        run: python scrape_and_integrate.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto-updated news from Bao Moi [skip ci]"
          git push
