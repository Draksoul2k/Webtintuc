name: Auto Update News from Bao Moi

on:
  schedule:
    - cron: '0 */5 * * *' # Chạy tự động mỗi 5 tiếng (theo giờ UTC)
  workflow_dispatch: # Cho phép bấm nút chạy thủ công trên giao diện GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Run news scraper script
        run: python scrape_and_integrate.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Auto-updated news from Bao Moi [skip ci]"
          git push
