<!DOCTYPE html>



<html class="notranslate" lang="vi" xmlns="http://www.w3.org/1999/xhtml">



<head>



  <meta charset="utf-8" />



  <meta name="google" content="notranslate" />



  <meta name="viewport" content="width=device-width, initial-scale=1.0" />



  <title>Tin tức tổng hợp | Tin tức 24h</title>



  



  <!-- FontAwesome Icons -->



  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />



  <style type="text/css">



    /* ==========================================================================



       24H.COM.VN STYLE DESIGN SYSTEM - 2-COLUMN GRID WITH STICKY SIDEBAR



       ========================================================================== */



    :root {



      --primary: #599b31;          /* 24h brand green */



      --primary-hover: #488224;



      --bg-body: #f4f6f8;



      --bg-card: #ffffff;



      --text-main: #222222;



      --text-muted: #6e7375;



      --border-color: #eef0f2;



      --shadow: 0 1px 3px rgba(0, 0, 0, 0.05);



      --radius: 6px;



    }



    [data-theme="dark"] {



      --bg-body: #0b0f19;



      --bg-card: #151d30;



      --text-main: #f1f5f9;



      --text-muted: #94a3b8;



      --border-color: #1e293b;



      --shadow: 0 4px 20px rgba(0, 0, 0, 0.15);



    }



    * {



      box-sizing: border-box;



      margin: 0;



      padding: 0;



    }



    body {



      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;



      background-color: var(--bg-body);



      color: var(--text-main);



      line-height: 1.5;



      padding-bottom: 40px;



      transition: background-color 0.3s ease, color 0.3s ease;



    }



    a {



      text-decoration: none;



      color: inherit;



    }



    /* Header & Navigation Bar (24h Green theme) */



    header.header {



      background-color: var(--primary);



      position: sticky;



      top: 0;



      z-index: 100;



      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);



    }



    .header-container {



      max-width: 1168px;



      margin: 0 auto;



      height: 50px;



      display: flex;



      justify-content: space-between;



      align-items: center;



      padding: 0 16px;



    }



    .header-left-nav {



      display: flex;



      align-items: center;



      gap: 16px;



      height: 100%;



    }



    .menu-toggle-btn {



      color: #ffffff;



      font-size: 1.25rem;



      background: none;



      border: none;



      cursor: pointer;



      display: flex;



      align-items: center;



    }



    .home-link {



      color: #ffffff;



      font-size: 1.2rem;



      display: flex;



      align-items: center;



      height: 100%;



      padding: 0 8px;



    }



    .main-nav {



      display: flex;



      align-items: center;



      list-style: none;



      white-space: nowrap;



      height: 100%;



    }



    .main-nav li {



      height: 100%;



      display: flex;



      align-items: center;



    }



    .main-nav li a {



      color: #ffffff;



      font-weight: 700;



      font-size: 0.82rem;



      text-transform: uppercase;



      padding: 0 12px;



      height: 100%;



      display: flex;



      align-items: center;



      opacity: 0.9;



      transition: background-color 0.2s ease;



    }



    .main-nav li a:hover, .main-nav li.active a {



      background-color: var(--primary-hover);



      opacity: 1;



    }



    .header-right {



      display: flex;



      align-items: center;



      gap: 12px;



    }



    .search-box {



      background-color: rgba(255, 255, 255, 0.15);



      border: 1px solid rgba(255, 255, 255, 0.2);



      border-radius: 9999px;



      padding: 6px 14px;



      display: flex;



      align-items: center;



      gap: 8px;



      width: 220px;



      transition: all 0.2s ease;



    }



    .search-box:focus-within {



      background-color: #ffffff;



      border-color: #ffffff;



    }



    .search-box i {



      color: #ffffff;



      font-size: 0.85rem;



    }



    .search-box:focus-within i {



      color: var(--text-muted);



    }



    .search-box input {



      border: none;



      background: transparent;



      outline: none;



      width: 100%;



      font-size: 0.8rem;



      color: #ffffff;



    }



    .search-box:focus-within input {



      color: #222222;



    }



    .search-box input::placeholder {



      color: rgba(255, 255, 255, 0.7);



    }



    .theme-toggle {



      background: none;



      border: 1px solid rgba(255, 255, 255, 0.3);



      border-radius: 50%;



      width: 30px;



      height: 30px;



      display: flex;



      align-items: center;



      justify-content: center;



      cursor: pointer;



      color: #ffffff;



      transition: all 0.2s ease;



    }



    .theme-toggle:hover {



      background-color: rgba(255, 255, 255, 0.1);



    }



    /* Trending Section */



    .trending-section {



      background-color: var(--bg-card);



      border-bottom: 1px solid var(--border-color);



      padding: 8px 0;



      margin-bottom: 20px;



    }



    .trending-container {



      max-width: 1168px;



      margin: 0 auto;



      padding: 0 16px;



      display: flex;



      align-items: center;



      gap: 12px;



    }



    .trending-label {



      font-weight: 800;



      color: #ef4444;



      font-size: 0.85rem;



      display: flex;



      align-items: center;



      gap: 4px;



      white-space: nowrap;



    }



    .trending-items {



      display: flex;



      align-items: center;



      gap: 20px;



      overflow-x: auto;



      scrollbar-width: none;



      width: 100%;



    }



    .trending-items::-webkit-scrollbar {



      display: none;



    }



    .trending-items a {



      font-size: 0.82rem;



      font-weight: 600;



      color: var(--text-main);



      white-space: nowrap;



      transition: color 0.2s ease;



    }



    .trending-items a:hover {



      color: var(--primary);



    }



    /* Main Container (2-Column Grid Layout) */



    .main-layout {



      max-width: 1168px;



      margin: 0 auto;



      padding: 0 16px;



    }



    .main-layout-grid {



      display: grid;



      grid-template-columns: 840px 288px;



      gap: 20px;



    }



    /* Column 1: Primary Content (Left) */



    .primary-content {



      display: flex;



      flex-direction: column;



      gap: 20px;



    }



    /* Homepage Top Block: Featured Grid (Featured on Left, Text list on Right) */



    .homepage-top-grid {



      display: grid;



      grid-template-columns: 540px 280px;



      gap: 20px;



    }



    .top-large-card {



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      overflow: hidden;



      cursor: pointer;



      box-shadow: var(--shadow);



      display: flex;



      flex-direction: column;



      transition: all 0.2s ease;



    }



    .top-large-card:hover {



      box-shadow: 0 4px 16px rgba(0,0,0,0.06);



    }



    .top-large-image {



      width: 100%;



      aspect-ratio: 16/10;



      overflow: hidden;



      position: relative;



    }



    .top-large-image.no-image {



      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);



      display: flex;



      align-items: center;



      justify-content: center;



    }



    .top-large-image.no-image::before {



      content: '\f1ea';



      font-family: 'Font Awesome 6 Free';



      font-weight: 900;



      font-size: 3rem;



      color: #94a3b8;



    }



    .top-large-image img {



      width: 100%;



      height: 100%;



      object-fit: cover;



      transition: transform 0.5s ease;



    }



    .top-large-card:hover .top-large-image img {



      transform: scale(1.02);



    }



    .top-large-content {



      padding: 16px;



    }



    .top-large-content h2 {



      font-size: 1.2rem;



      font-weight: 800;



      line-height: 1.35;



      margin-bottom: 8px;



      color: var(--text-main);



      transition: color 0.15s ease;



    }



    .top-large-card:hover h2 {



      color: var(--primary);



    }



    .top-large-content p {



      font-size: 0.82rem;



      color: var(--text-muted);



      line-height: 1.45;



    }



    /* Column 2 (Middle) inside Homepage Top Block */



    .middle-content {



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      padding: 16px;



      box-shadow: var(--shadow);



      display: flex;



      flex-direction: column;



      gap: 12px;



    }



    .column-title {



      font-size: 0.85rem;



      font-weight: 800;



      color: var(--primary);



      text-transform: uppercase;



      border-bottom: 2px solid var(--primary);



      padding-bottom: 6px;



      margin-bottom: 4px;



      display: flex;



      align-items: center;



      gap: 6px;



    }



    .text-news-item {



      display: flex;



      gap: 10px;



      padding-bottom: 10px;



      border-bottom: 1px solid var(--border-color);



      cursor: pointer;



      align-items: center; /* vertical alignment */



    }



    .text-news-item:last-child {



      border-bottom: none;



      padding-bottom: 0;



    }



    .text-news-thumb {



      width: 45px;



      height: 45px;



      border-radius: 4px;



      overflow: hidden;



      flex-shrink: 0;



      position: relative;



    }



    .text-news-thumb img {



      width: 100%;



      height: 100%;



      object-fit: cover;



    }



    .text-news-thumb.no-image {



      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);



      display: flex;



      align-items: center;



      justify-content: center;



    }



    .text-news-thumb.no-image::before {



      content: '1ea';



      font-family: 'Font Awesome 6 Free';



      font-weight: 900;



      font-size: 0.8rem;



      color: #94a3b8;



    }



    .text-news-right {



      display: flex;



      flex-direction: column;



      justify-content: center;



      flex-grow: 1;



    }



    .text-news-cat-label {



      font-size: 0.65rem;



      font-weight: 700;



      color: var(--primary);



      margin-bottom: 1px;



      display: inline-block;



    }



    .text-news-title {



      font-size: 0.8rem;



      font-weight: 700;



      color: var(--text-main);



      line-height: 1.3;



      display: -webkit-box;



      -webkit-line-clamp: 2;



      -webkit-box-orient: vertical;



      overflow: hidden;



      transition: color 0.15s ease;



    }



    .text-news-item:hover .text-news-title {



      color: var(--primary);



    }



    /* Top 3 Horizontal Cards Row */



    .top-three-row {



      display: grid;



      grid-template-columns: repeat(3, 1fr);



      gap: 12px;



    }



    /* Infinite Scroll Stream Container (Spans full width of left column) */



    .articles-grid {



      display: grid;



      grid-template-columns: repeat(2, 1fr);



      gap: 20px;



      margin-top: 10px;



    }



    /* Cards */



    .card {



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      overflow: hidden;



      cursor: pointer;



      box-shadow: var(--shadow);



      display: flex;



      flex-direction: column;



      transition: all 0.2s ease;



    }



    .card:hover {



      transform: translateY(-2px);



      box-shadow: 0 4px 16px rgba(0,0,0,0.06);



    }



    .card-thumb {



      width: 100%;



      overflow: hidden;



      position: relative;



    }



    .card-thumb.no-image {



      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);



      display: flex;



      align-items: center;



      justify-content: center;



      aspect-ratio: 16/9;



    }



    .card-thumb.no-image::before {



      content: '\f1ea';



      font-family: 'Font Awesome 6 Free';



      font-weight: 900;



      font-size: 2rem;



      color: #94a3b8;



    }



    [data-theme="dark"] .card-thumb.no-image {



      background: linear-gradient(135deg, #1e293b, #0f172a);



    }



    .card-thumb img {



      width: 100%;



      height: 100%;



      object-fit: cover;



      transition: transform 0.5s ease;



    }



    .card:hover .card-thumb img {



      transform: scale(1.03);



    }



    .card-content {



      padding: 16px;



      display: flex;



      flex-direction: column;



      flex-grow: 1;



    }



    .card-meta {



      display: flex;



      align-items: center;



      gap: 12px;



      font-size: 0.7rem;



      font-weight: 600;



      color: var(--text-muted);



      margin-bottom: 8px;



    }



    .card-meta span {



      display: flex;



      align-items: center;



      gap: 4px;



    }



    .card-meta span i {



      color: var(--primary);



    }



    .card-title {



      font-size: 0.95rem;



      font-weight: 700;



      color: var(--text-main);



      line-height: 1.4;



      margin-bottom: 8px;



      display: -webkit-box;



      -webkit-line-clamp: 2;



      -webkit-box-orient: vertical;



      overflow: hidden;



      height: 2.7rem;



      transition: color 0.2s ease;



    }



    .card:hover .card-title {



      color: var(--primary);



    }



    .card-desc {



      font-size: 0.8rem;



      color: var(--text-muted);



      line-height: 1.45;



      display: -webkit-box;



      -webkit-line-clamp: 3;



      -webkit-box-orient: vertical;



      overflow: hidden;



    }



    /* Category block divider inside infinite scroll */



    .category-block-divider {



      grid-column: 1 / span 2;



      margin: 10px 0;



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      padding: 16px;



      box-shadow: var(--shadow);



    }



    .category-block-header {



      display: flex;



      justify-content: space-between;



      align-items: center;



      margin-bottom: 12px;



      border-bottom: 2px solid var(--primary);



      padding-bottom: 8px;



    }



    .category-block-header h3 {



      font-size: 0.95rem;



      font-weight: 800;



      color: var(--primary);



      display: flex;



      align-items: center;



      gap: 6px;



    }



    .category-block-header button {



      background-color: var(--primary);



      color: #ffffff;



      border: none;



      border-radius: 6px;



      padding: 4px 10px;



      font-size: 0.7rem;



      font-weight: 700;



      cursor: pointer;



      display: flex;



      align-items: center;



      gap: 4px;



      transition: background-color 0.2s ease;



    }



    .category-block-header button:hover {



      background-color: var(--primary-hover);



    }



    .category-block-grid {



      display: grid;



      grid-template-columns: repeat(3, 1fr);



      gap: 12px;



    }



    /* Column 2: Sticky Sidebar (Right) */



    .sidebar-content {



      display: flex;



      flex-direction: column;



      gap: 20px;



      position: sticky;



      top: 70px;



      height: fit-content;



    }



    .sidebar-news-list {



      display: flex;



      flex-direction: column;



      gap: 12px;



    }



    .sidebar-horizontal-card {



      display: flex;



      gap: 10px;



      cursor: pointer;



      padding-bottom: 10px;



      border-bottom: 1px solid var(--border-color);



    }



    .sidebar-horizontal-card:last-child {



      border-bottom: none;



      padding-bottom: 0;



    }



    .sidebar-card-thumb {



      width: 90px;



      height: 60px;



      border-radius: 4px;



      overflow: hidden;



      position: relative;



      flex-shrink: 0;



    }



    .sidebar-card-thumb.no-image {



      background: linear-gradient(135deg, #e2e8f0, #cbd5e1);



      display: flex;



      align-items: center;



      justify-content: center;



    }



    .sidebar-card-thumb.no-image::before {



      content: '\f1ea';



      font-family: 'Font Awesome 6 Free';



      font-weight: 900;



      font-size: 1.25rem;



      color: #94a3b8;



    }



    .sidebar-card-thumb img {



      width: 100%;



      height: 100%;



      object-fit: cover;



    }



    .sidebar-card-right {



      display: flex;



      flex-direction: column;



      justify-content: space-between;



      flex-grow: 1;



    }



    .sidebar-card-title {



      font-size: 0.8rem;



      font-weight: 700;



      color: var(--text-main);



      line-height: 1.3;



      display: -webkit-box;



      -webkit-line-clamp: 2;



      -webkit-box-orient: vertical;



      overflow: hidden;



      transition: color 0.15s ease;



    }



    .sidebar-horizontal-card:hover .sidebar-card-title {



      color: var(--primary);



    }



    .sidebar-card-meta {



      display: flex;



      align-items: center;



      gap: 10px;



      font-size: 0.68rem;



      color: var(--text-muted);



    }



    .sidebar-card-meta span {



      display: flex;



      align-items: center;



      gap: 3px;



    }



    /* Widgets */



    .widget {



      background-color: var(--bg-card);



      border: 1px solid var(--border-color);



      border-radius: var(--radius);



      padding: 16px;



      box-shadow: var(--shadow);



    }



    .widget-title {



      font-size: 0.82rem;



      font-weight: 800;



      color: var(--text-main);



      padding-bottom: 8px;



      border-bottom: 2px solid var(--primary);



      margin-bottom: 12px;



      text-transform: uppercase;



      display: flex;



      align-items: center;



      gap: 6px;



    }



    .widget-title i {



      color: var(--primary);



    }



    /* Weather widget */



    .weather-info {



      display: flex;



      align-items: center;



      justify-content: space-between;



    }



    .weather-left {



      display: flex;



      align-items: center;



      gap: 12px;



    }



    .weather-icon {



      font-size: 2rem;



      color: #f59e0b;



    }



    .weather-temp {



      font-size: 1.6rem;



      font-weight: 800;



    }



    .weather-city {



      font-weight: 700;



      font-size: 0.9rem;



    }



    .weather-desc {



      font-size: 0.75rem;



      color: var(--text-muted);



    }



    /* Gold widget table */



    .gold-table {



      width: 100%;



      border-collapse: collapse;



      font-size: 0.75rem;



    }



    .gold-table th, .gold-table td {



      padding: 6px 8px;



      text-align: left;



      border-bottom: 1px solid var(--border-color);



    }



    .gold-table th {



      font-weight: 700;



      color: var(--text-muted);



    }



    .gold-table td.gold-buy {



      color: #10b981;



      font-weight: 700;



    }



    .gold-table td.gold-sell {



      color: #ef4444;



      font-weight: 700;



    }



    /* Lottery widget */



    .lottery-grid {



      display: flex;



      flex-direction: column;



      gap: 8px;



    }



    .lottery-row {



      display: flex;



      justify-content: space-between;



      font-size: 0.8rem;



      padding: 4px 0;



      border-bottom: 1px dashed var(--border-color);



    }



    .lottery-label {



      font-weight: 700;



      color: var(--text-muted);



    }



    .lottery-numbers {



      font-weight: 800;



      color: #ef4444;



      font-size: 0.85rem;



    }



    /* Hashtags widget */



    .hashtags {



      display: flex;



      flex-wrap: wrap;



      gap: 6px;



    }



    .hashtags a {



      background-color: var(--bg-body);



      border: 1px solid var(--border-color);



      padding: 4px 8px;



      border-radius: 9999px;



      font-size: 0.7rem;



      font-weight: 700;



      color: var(--text-muted);



      transition: all 0.2s ease;



    }



    .hashtags a:hover {



      background-color: var(--primary);



      color: #ffffff;



      border-color: var(--primary);



    }



    /* Modal Reader */



    .modal-overlay {



      position: fixed;



      top: 0;



      left: 0;



      width: 100vw;



      height: 100vh;



      background-color: rgba(11, 15, 25, 0.5);



      backdrop-filter: blur(4px);



      -webkit-backdrop-filter: blur(4px);



      z-index: 999;



      opacity: 0;



      visibility: hidden;



      transition: all 0.3s ease;



      display: flex;



      align-items: center;



      justify-content: center;



    }



    .modal-overlay.show {



      opacity: 1;



      visibility: visible;



    }



    .modal-container {



      background-color: var(--bg-card);



      border-radius: 12px;



      width: 90%;



      max-width: 720px;



      max-height: 85vh;



      overflow-y: auto;

    // Load More Articles (Infinite Scroll)



    function loadMoreArticles() {



      if (isLoading) return;



      isLoading = true;



      



      const spinner = document.getElementById('loading-spinner');



      if (spinner) spinner.style.display = 'flex';



      setTimeout(() => {



        currentPage++;



        



        const streamContainer = document.getElementById('infinite-stream');



        const leftPrimary = document.getElementById('left-primary-container');



        



        if (!streamContainer) {



          isLoading = false;



          return;



        }



        let filtered = [];



        if (currentCategory === 'all') {



          filtered = mockArticles;



        } else {



          filtered = mockArticles.filter(art => art.category === currentCategory);



        }



        // Load next batch of articles (modulo wrap-around for true infinite scrolling!)



        const offsetStart = 15 + (currentPage - 2) * articlesLimit;



        const offsetEnd = offsetStart + articlesLimit;



        



        let batchHtml = '';



        



        if (categoryBlocksIndex >= blockCategories.length) {



          // Inside the "Tin tức cũ hơn" section - render OLD cards WITHOUT date!



          for (let i = offsetStart; i < offsetEnd; i++) {



            const index = i % filtered.length;



            batchHtml += renderOldArticleCard(filtered[index]);



          }



        } else {



          // Inside normal stream - render standard cards with date



          for (let i = offsetStart; i < offsetEnd; i++) {



            const index = i % filtered.length;



            batchHtml += renderArticleCard(filtered[index]);



          }



        }



        



        // Wrap the batched cards inside a grid wrapper to display correctly below category dividers!



        const gridHtml = `<div class="articles-grid" style="margin-top: 15px;">${batchHtml}</div>`;



        streamContainer.insertAdjacentHTML('beforeend', gridHtml);



        // Manage category dividers: render them ONCE, then switch to "Tin tức cũ hơn" section



        if (categoryBlocksIndex < blockCategories.length) {



          const nextCategory = blockCategories[categoryBlocksIndex];



          if (leftPrimary && spinner) {



            streamContainer.insertAdjacentHTML('beforeend', renderCategoryBlock(nextCategory));



          }



          categoryBlocksIndex++;



        } else {



          // If we have just finished rendering the last category block ("Du lịch"), insert the "Các tin tức cũ hơn" section header



          if (!oldNewsHeaderInserted) {



            const headerHtml = `



              <div class="category-block-divider" style="grid-column: 1 / span 2; margin: 20px 0 10px 0;">



                <div class="category-block-header" style="border-color: #6e7375;">



                  <h3 style="color: #6e7375;"><i class="fas fa-history"></i> Tin tức cũ hơn</h3>



                </div>



              </div>



            `;



            if (leftPrimary && spinner) {



              leftPrimary.insertBefore(document.createRange().createContextualFragment(headerHtml), spinner);



            }



            oldNewsHeaderInserted = true;



          }



        }



        



        if (spinner) spinner.style.display = 'none';



        isLoading = false;



      }, 1000);

    function toggleTheme() {

      if (html.getAttribute('data-theme') === 'dark') {



        html.removeAttribute('data-theme');



        themeBtn.innerHTML = '<i class="fas fa-moon"></i>';



        localStorage.setItem('theme', 'light');



      } else {

        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';



        localStorage.setItem('theme', 'dark');



      }



    }

      const toast = document.getElementById('toast-message');



      toast.innerText = msg;



      toast.classList.add('show');



      setTimeout(() => {



        toast.classList.remove('show');



      }, 2000);



    }



    // Infinite Scroll trigger on scroll to bottom



    window.addEventListener('scroll', () => {



      if (currentCategory !== 'all') return;



      



      if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 120) {



        loadMoreArticles();



      }



    });



    // Initialize page



    window.addEventListener('DOMContentLoaded', () => {



      loadSavedTheme();



      initDynamicWidgets();



      filterCategory('all');



    });



  </script>



</body>



</html>
